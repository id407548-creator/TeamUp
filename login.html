<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로그인 - TeamUp</title>
    <!-- Google Fonts 및 아이콘 폰트 로드 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- 메인 CSS 파일 연결 -->
    <link rel="stylesheet" href="static/css/style.css">
</head>
<body>

    <!-- 동적으로 삽입될 공통 내비게이션 바 -->
    <div id="navbar-placeholder"></div>

    <!-- 메인 콘텐츠 영역 -->
    <main style="flex: 1; padding: 40px 0; display: flex; align-items: center;">
        <div class="container" style="display: flex; justify-content: center; align-items: center; min-height: 60vh;">
            <div class="glass-panel" style="width: 100%; max-width: 420px; padding: 40px; background: white;">
                <div style="text-align: center; margin-bottom: 30px;">
                    <h2 style="font-size: 1.8rem; margin-bottom: 8px; color: var(--text-primary);">로그인</h2>
                    <p style="color: var(--text-secondary); font-size: 0.9rem;">TeamUp에 로그인하여 팀 프로젝트를 계속하세요.</p>
                </div>
                
                <!-- 경고 메시지 표시 영역 -->
                <div id="error-message" style="display: none; background: rgba(239, 68, 68, 0.15); border: 1px solid var(--danger); color: #b91c1c; padding: 12px; border-radius: 8px; font-size: 0.9rem; margin-bottom: 20px; text-align: center;">
                    오류 메시지 자리
                </div>

                <form id="login-form">
                    <div class="form-group">
                        <label for="username" class="form-label">아이디</label>
                        <input type="text" id="username" name="username" class="form-control" placeholder="아이디 입력" required>
                    </div>
                    
                    <div class="form-group" style="margin-bottom: 24px;">
                        <label for="password" class="form-label">비밀번호</label>
                        <input type="password" id="password" name="password" class="form-control" placeholder="비밀번호 입력" required>
                    </div>
                    
                    <button type="submit" class="btn btn-primary" style="width: 100%; padding: 12px; font-size: 1rem; margin-bottom: 20px;">
                        로그인
                    </button>
                </form>
                
                <div style="text-align: center; font-size: 0.9rem; color: var(--text-muted);">
                    아직 계정이 없으신가요? <a href="register.html" style="color: var(--primary); font-weight: 600;">회원가입</a>
                </div>
            </div>
        </div>
    </main>

    <!-- 푸터 -->
    <footer>
        <div class="container">
            <p>&copy; 2026 TeamUp. All rights reserved. Designed for Premium Collaboration.</p>
        </div>
    </footer>

    <!-- 로컬 스토리지 데이터베이스 및 공통 스크립트 연결 -->
    <script src="js/storage.js"></script>
    <script src="js/navbar.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
