<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>팀 프로젝트 상세 - TeamUp</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div id="navbar-placeholder"></div>

<div class="container" style="max-width:1100px; padding-top:40px;">

    <div class="glass-panel" style="padding:32px; margin-bottom:30px; background: #fff; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05);">
        <div style="display:flex; justify-content:space-between; align-items:flex-start;">
            <div>
                <span id="team-subject-display" style="display:inline-block; margin-bottom:10px; padding:4px 10px; border-radius:20px; background:#eef2ff; font-size:0.85rem; color:#4f46e5; font-weight:bold;">
                    과목 로딩 중...
                </span>
                <h1 id="team-name-display" style="margin: 0 0 10px 0; font-size: 2rem;">팀 이름 로딩 중...</h1>
                <p id="team-description-display" style="color:#64748b; margin:0;">설명을 로딩 중입니다.</p>
            </div>
            <div style="display:flex; gap:10px; align-items:center;">
                <div id="team-members-avatars" style="display:flex; align-items:center;"></div>
                <button id="invite-member-btn" class="btn btn-secondary" style="padding: 8px 16px; cursor: pointer;">팀원 초대</button>
            </div>
        </div>
    </div>

    <div style="display:flex; gap:20px; margin-bottom:30px; border-bottom:1px solid #e2e8f0; padding-bottom:10px;">
        <button class="tab-btn active" id="tab-tasks" style="background:none; border:none; font-weight:bold; cursor:pointer; padding:10px; color:#4f46e5; border-bottom:2px solid #4f46e5;">역할 분담 (Tasks)</button>
        <button class="tab-btn" id="tab-schedules" style="background:none; border:none; color:#64748b; cursor:pointer; padding:10px;">일정 관리 (Schedules)</button>
        <button class="tab-btn" id="tab-files" style="background:none; border:none; color:#64748b; cursor:pointer; padding:10px;">자료 공유 (Files)</button>
    </div>

    <div id="tasks-section">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
            <h2 style="margin:0;">프로젝트 업무 현황</h2>
            <button id="open-add-task-modal" class="btn btn-primary" style="padding: 10px 20px; cursor: pointer;">업무 추가</button>
        </div>

        <div style="display:grid; grid-template-columns:repeat(3, 1fr); gap:20px;">
            <div class="glass-panel" style="padding:20px; background:#f8fafc; border-radius:12px;">
                <div style="display:flex; justify-content:space-between; margin-bottom:15px; font-weight:bold;">
                    <span>시작 전</span>
                    <span id="todo-count" style="background:#e2e8f0; padding:2px 8px; border-radius:10px; font-size:0.85rem;">0</span>
                </div>
                <div id="todo-list" style="display:flex; flex-direction:column; gap:10px; min-height:200px;"></div>
            </div>

            <div class="glass-panel" style="padding:20px; background:#f0fdf4; border-radius:12px;">
                <div style="display:flex; justify-content:space-between; margin-bottom:15px; font-weight:bold; color:#16a34a;">
                    <span>진행 중</span>
                    <span id="inprogress-count" style="background:#dcfce7; padding:2px 8px; border-radius:10px; font-size:0.85rem;">0</span>
                </div>
                <div id="inprogress-list" style="display:flex; flex-direction:column; gap:10px; min-height:200px;"></div>
            </div>

            <div class="glass-panel" style="padding:20px; background:#eff6ff; border-radius:12px;">
                <div style="display:flex; justify-content:space-between; margin-bottom:15px; font-weight:bold; color:#2563eb;">
                    <span>완료</span>
                    <span id="done-count" style="background:#dbeafe; padding:2px 8px; border-radius:10px; font-size:0.85rem;">0</span>
                </div>
                <div id="done-list" style="display:flex; flex-direction:column; gap:10px; min-height:200px;"></div>
            </div>
        </div>
    </div>

</div>

<div id="task-modal" class="modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); align-items:center; justify-content:center; z-index:1000;">
    <div class="modal-content glass-panel" style="background:#fff; padding:30px; border-radius:12px; width:100%; max-width:500px; box-shadow:0 10px 25px rgba(0,0,0,0.1);">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
            <h3 id="task-modal-title" style="margin:0;">업무 추가</h3>
            <button class="close-task-modal" style="background:none; border:none; font-size:1.5rem; cursor:pointer;">&times;</button>
        </div>
        
        <form id="task-form">
            <input type="hidden" id="task-id">
            
            <div class="form-group" style="margin-bottom:15px;">
                <label style="display:block; margin-bottom:5px; font-weight:bold;">업무 제목</label>
                <input type="text" id="task-title-input" class="form-control" style="width:100%; padding:8px; border:1px solid #cbd5e1; border-radius:6px;" required>
            </div>

            <div class="form-group" style="margin-bottom:15px;">
                <label style="display:block; margin-bottom:5px; font-weight:bold;">설명</label>
                <textarea id="task-desc-input" class="form-control" style="width:100%; padding:8px; border:1px solid #cbd5e1; border-radius:6px; height:80px; resize:none;"></textarea>
            </div>

            <div class="form-group" style="margin-bottom:15px;">
                <label style="display:block; margin-bottom:5px; font-weight:bold;">담당자</label>
                <select id="task-assignee-input" class="form-control" style="width:100%; padding:8px; border:1px solid #cbd5e1; border-radius:6px;"></select>
            </div>

            <div class="form-group" style="margin-bottom:20px;">
                <label style="display:block; margin-bottom:5px; font-weight:bold;">진행 상태</label>
                <select id="task-status-input" class="form-control" style="width:100%; padding:8px; border:1px solid #cbd5e1; border-radius:6px;">
                    <option value="Todo">시작 전</option>
                    <option value="InProgress">진행 중</option>
                    <option value="Done">완료</option>
                </select>
            </div>

            <div style="display:flex; gap:10px; justify-content:flex-end;">
                <button type="button" class="btn btn-secondary close-task-modal" style="padding:8px 16px; cursor: pointer;">취소</button>
                <button type="submit" class="btn btn-primary" style="padding:8px 16px; cursor: pointer;">저장</button>
            </div>
        </form>
    </div>
</div>

<script src="js/storage.js"></script>

<script src="js/navbar.js"></script>

<script src="js/tasks.js"></script>

</body>
</html>
