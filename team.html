<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>팀 프로젝트 상세 - TeamUp</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div id="navbar-placeholder"></div>

<div class="container" style="max-width:1100px; padding-top:40px;">

    <div class="glass-panel" style="padding:32px; margin-bottom:30px;">
        <div style="display:flex; justify-content:between; align-items:flex-start;">
            <div>
                <span id="team-subject-display" style="display:inline-block; margin-bottom:10px; padding:4px 10px; border-radius:20px; background:#eef2ff; font-size:0.85rem; color:var(--primary-color);">
                    과목 로딩 중...
                </span>
                <h1 id="team-name-display" style="margin-bottom:10px;">팀 이름 로딩 중...</h1>
                <p id="team-description-display" style="color:var(--text-secondary);">설명을 로딩 중입니다.</p>
            </div>
            <button id="invite-member-btn" class="btn btn-secondary">팀원 초대</button>
        </div>
    </div>

    <div style="display:flex; gap:20px; margin-bottom:30px; border-bottom:1px solid #e2e8f0; padding-bottom:10px;">
        <button class="tab-btn active" onclick="switchTab('tasks')" style="background:none; border:none; font-weight:bold; cursor:pointer; padding:10px;">역할 분담 (Tasks)</button>
        <button class="tab-btn" onclick="switchTab('schedules')" style="background:none; border:none; color:var(--text-secondary); cursor:pointer; padding:10px;">일정 관리 (Schedules)</button>
        <button class="tab-btn" onclick="switchTab('files')" style="background:none; border:none; color:var(--text-secondary); cursor:pointer; padding:10px;">자료 공유 (Files)</button>
    </div>

    <div id="tasks-section">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
            <h2>프로젝트 업무 현황</h2>
            <button id="open-add-task-modal" class="btn btn-primary" style="padding: 8px 16px; font-size: 0.9rem;">업무 추가</button>
        </div>

        <div style="display:grid; grid-template-columns:repeat(3, 1fr); gap:20px;">
            <div class="glass-panel" style="padding:20px; background:#f8fafc;">
                <div style="display:flex; justify-content:space-between; margin-bottom:15px; font-weight:bold;">
                    <span>시작 전</span>
                    <span id="todo-count" style="background:#e2e8f0; padding:2px 8px; border-radius:10px; font-size:0.85rem;">0</span>
                </div>
                <div id="todo-list" style="display:flex; flex-direction:column; gap:10px;">
                    </div>
            </div>

            <div class="glass-panel" style="padding:20px; background:#f0fdf4;">
                <div style="display:flex; justify-content:space-between; margin-bottom:15px; font-weight:bold; color:#16a34a;">
                    <span>진행 중</span>
                    <span id="inprogress-count" style="background:#dcfce7; padding:2px 8px; border-radius:10px; font-size:0.85rem;">0</span>
                </div>
                <div id="inprogress-list" style="display:flex; flex-direction:column; gap:10px;">
                    </div>
            </div>

            <div class="glass-panel" style="padding:20px; background:#eff6ff;">
                <div style="display:flex; justify-content:space-between; margin-bottom:15px; font-weight:bold; color:#2563eb;">
                    <span>완료</span>
                    <span id="done-count" style="background:#dbeafe; padding:2px 8px; border-radius:10px; font-size:0.85rem;">0</span>
                </div>
                <div id="done-list" style="display:flex; flex-direction:column; gap:10px;">
                    </div>
            </div>
        </div>
    </div>

</div>

<script src="js/storage.js"></script>
<script src="js/navbar.js"></script>
<script src="js/tasks.js"></script> <script>
    // 간단한 탭 전환 함수 예시
    function switchTab(tabName) {
        alert(tabName + " 기능으로 이동 또는 스크립트 활성화");
        // 필요 시 다른 js 파일(schedules.js, files.js)의 로드/렌더링 함수를 여기서 호출하도록 구성합니다.
    }
</script>

</body>
</html>
