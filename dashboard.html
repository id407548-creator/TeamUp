{% extends 'base.html' %}

{% block title %}대시보드 - TeamUp{% endblock %}

{% block content %}
<div class="container" style="max-width: 1100px;">
    <!-- 대시보드 상단 웰컴 영역 -->
    <div class="glass-panel" style="padding: 32px; margin-bottom: 40px; background: linear-gradient(135deg, rgba(255,255,255,0.9) 0%, rgba(243,244,246,0.9) 100%); display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 20px;">
        <div>
            <h1 style="font-size: 2.2rem; margin-bottom: 8px; color: var(--text-primary); font-weight: 850;">
                안녕하세요, {{ session.get('display_name') }}님! 👋
            </h1>
            <p style="color: var(--text-secondary); font-size: 1rem;">
                오늘도 팀원들과 함께 멋진 프로젝트를 완성해 보세요.
            </p>
        </div>
        <button id="open-create-team-modal" class="btn btn-primary" style="padding: 12px 24px;">
            <i class="fa-solid fa-plus"></i> 새 프로젝트 만들기
        </button>
    </div>

    <!-- 섹션 타이틀 -->
    <div style="margin-bottom: 20px; display: flex; align-items: center; gap: 10px;">
        <h2 style="font-size: 1.4rem; color: var(--text-primary); font-weight: 700;">진행 중인 팀 프로젝트</h2>
        <span style="font-size: 0.8rem; background: var(--primary-glow); color: var(--primary); padding: 2px 10px; border-radius: 20px; font-weight: 700;" id="teams-count-badge">
            로드 중
        </span>
    </div>

    <!-- 팀 목록 리스트 컨테이너 -->
    <div id="team-list-container" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 24px; min-height: 200px;">
        <!-- 로딩 인디케이터 -->
        <div class="glass-panel" style="grid-column: 1 / -1; padding: 60px 40px; text-align: center; color: var(--text-secondary); background: white;">
            <i class="fa-solid fa-circle-notch fa-spin" style="font-size: 2rem; margin-bottom: 16px; color: var(--primary);"></i>
            <p style="font-weight: 500;">프로젝트 정보를 신속하게 불러오고 있습니다...</p>
        </div>
    </div>
</div>

<!-- 팀 프로젝트 생성 모달 -->
<div id="create-team-modal" class="modal">
    <div class="modal-content glass-panel" style="border-radius: 20px; box-shadow: 0 20px 50px rgba(15, 23, 42, 0.15);">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px;">
            <h3 style="font-size: 1.4rem; color: var(--text-primary); font-weight: 750;">
                <i class="fa-solid fa-folder-plus" style="color: var(--primary); margin-right: 8px;"></i>새 팀 프로젝트 생성
            </h3>
            <button id="close-create-team-modal" style="background: none; border: none; color: var(--text-secondary); cursor: pointer; font-size: 1.2rem;">
                <i class="fa-solid fa-xmark"></i>
            </button>
        </div>
        
        <div id="modal-error-message" style="display: none; background: rgba(239, 68, 68, 0.15); border: 1px solid var(--danger); color: #b91c1c; padding: 10px; border-radius: 8px; font-size: 0.9rem; margin-bottom: 16px; text-align: center;">
            에러 메시지
        </div>

        <form id="create-team-form">
            <div class="form-group">
                <label for="team-name" class="form-label">팀 프로젝트 이름</label>
                <input type="text" id="team-name" name="name" class="form-control" placeholder="예: 캡스톤 디자인 3조" required>
            </div>
            
            <div class="form-group">
                <label for="team-subject" class="form-label">수강 과목명</label>
                <input type="text" id="team-subject" name="subject" class="form-control" placeholder="예: 소프트웨어 공학" required>
            </div>

            <div class="form-group" style="margin-bottom: 24px;">
                <label for="team-description" class="form-label">프로젝트 설명 (선택)</label>
                <textarea id="team-description" name="description" class="form-control" rows="3" placeholder="간단한 협업 규칙이나 프로젝트 개요를 적어주세요."></textarea>
            </div>

            <div style="display: flex; justify-content: flex-end; gap: 12px;">
                <button type="button" id="cancel-create-team" class="btn btn-secondary" style="padding: 10px 20px;">취소</button>
                <button type="submit" class="btn btn-primary" style="padding: 10px 20px;">프로젝트 만들기</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script src="{{ url_for('static', filename='js/dashboard.js') }}"></script>
<script>
    // 대시보드 로드 후 웰컴 배지 카운트 관리용 헬퍼 스크립트 추가
    document.addEventListener('DOMContentLoaded', () => {
        const badge = document.getElementById('teams-count-badge');
        
        async function updateBadge() {
            try {
                const response = await fetch('/api/teams');
                const result = await response.json();
                if (response.ok && result.success) {
                    badge.textContent = `${result.teams.length}개`;
                } else {
                    badge.textContent = '0개';
                }
            } catch (e) {
                badge.textContent = '0개';
            }
        }
        updateBadge();
        
        // 팀 생성 성공 시 배지 자동 갱신을 위해 관찰
        document.getElementById('create-team-form').addEventListener('submit', () => {
            setTimeout(updateBadge, 1000);
        });
    });
</script>
{% endblock %}
