<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Indigo Collaborator - 로그인</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <div class="brand">🚀 Indigo Collaborator</div>
        </div>
    </nav>

    <main style="flex: 1; display: flex; align-items: center; justify-content: center; padding: 40px 0;">
        <div class="glass-panel" style="width: 100%; max-width: 400px; padding: 32px; text-align: center; background: white;">
            <h2 style="margin-bottom: 24px; font-size: 1.8rem; color: var(--text-primary);">환영합니다</h2>
            
            <form id="auth-form">
                <div class="form-group">
                    <label class="form-label" for="username">아이디 (Username)</label>
                    <input type="text" id="username" class="form-control" placeholder="아이디를 입력하세요" required>
                </div>
                <div class="form-group" id="display-name-group" style="display: none;">
                    <label class="form-label" for="display-name">이름 (Display Name)</label>
                    <input type="text" id="display-name" class="form-control" placeholder="사용할 이름을 입력하세요">
                </div>
                <div class="form-group">
                    <label class="form-label" for="password">비밀번호</label>
                    <input type="password" id="password" class="form-control" placeholder="비밀번호를 입력하세요" required>
                </div>
                
                <button type="submit" id="auth-submit-btn" class="btn btn-primary" style="width: 100%; margin-top: 12px;">로그인</button>
            </form>
            
            <p style="margin-top: 20px; font-size: 0.9rem; color: var(--text-secondary);">
                <span id="auth-toggle-msg">계정이 없으신가요?</span>
                <a href="#" id="auth-toggle-btn" style="font-weight: 600; margin-left: 4px;">회원가입</a>
            </p>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 Indigo Collaborator. All rights reserved.</p>
    </footer>

    <script src="db.js"></script>
    <script src="auth.js"></script>
</body>
</html>
