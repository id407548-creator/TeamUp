{% extends 'base.html' %}

{% block title %}회원가입 - TeamUp{% endblock %}

{% block content %}
<div class="container" style="display: flex; justify-content: center; align-items: center; min-height: 70vh;">
    <div class="glass-panel" style="width: 100%; max-width: 440px; padding: 40px;">
        <div style="text-align: center; margin-bottom: 30px;">
            <h2 style="font-size: 1.8rem; margin-bottom: 8px;">회원가입</h2>
            <p style="color: var(--text-secondary); font-size: 0.9rem;">TeamUp과 함께 스마트한 팀 과제를 시작하세요.</p>
        </div>
        
        <!-- 에러 메시지 표시 영역 -->
        <div id="error-message" style="display: none; background: rgba(239, 68, 68, 0.15); border: 1px solid var(--danger); color: #fca5a5; padding: 12px; border-radius: 8px; font-size: 0.9rem; margin-bottom: 20px; text-align: center;">
            오류 메시지 자리
        </div>

        <form id="register-form">
            <div class="form-group">
                <label for="username" class="form-label">아이디</label>
                <input type="text" id="username" name="username" class="form-control" placeholder="아이디 입력 (영문, 숫자 포함)" required>
            </div>

            <div class="form-group">
                <label for="display_name" class="form-label">이름 (표시명)</label>
                <input type="text" id="display_name" name="display_name" class="form-control" placeholder="실명 혹은 닉네임" required>
            </div>

            <div class="form-group">
                <label for="email" class="form-label">이메일</label>
                <input type="email" id="email" name="email" class="form-control" placeholder="example@univ.ac.kr" required>
            </div>
            
            <div class="form-group">
                <label for="password" class="form-label">비밀번호</label>
                <input type="password" id="password" name="password" class="form-control" placeholder="비밀번호 입력 (6자 이상)" required>
            </div>

            <div class="form-group" style="margin-bottom: 24px;">
                <label for="password_confirm" class="form-label">비밀번호 확인</label>
                <input type="password" id="password_confirm" class="form-control" placeholder="비밀번호 재입력" required>
            </div>
            
            <button type="submit" class="btn btn-primary" style="width: 100%; padding: 12px; font-size: 1rem; margin-bottom: 20px;">
                회원가입 완료
            </button>
        </form>
        
        <div style="text-align: center; font-size: 0.9rem; color: var(--text-muted);">
            이미 계정이 있으신가요? <a href="{{ url_for('login') }}" style="color: var(--secondary); font-weight: 500;">로그인</a>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script src="{{ url_for('static', filename='js/auth.js') }}"></script>
{% endblock %}
